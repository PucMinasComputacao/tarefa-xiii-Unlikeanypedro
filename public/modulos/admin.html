<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administracao - Artfinder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/home-styles.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="stripes" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
  <nav>
    <a class="nav-logo" href="index.html">Artfinder</a>
    <ul class="links-nav" id="Links-nav"></ul>
    <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </nav>

  <main class="admin-page">
    <section class="admin-form-panel">
      <h1>Usuarios</h1>
      <p class="empty-message">As obras sao carregadas somente pela API oficial do Metropolitan Museum.</p>
    </section>

    <section class="admin-list-panel">
      <h2>Usuarios cadastrados</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Login</th>
              <th>Email</th>
              <th>Admin</th>
              <th>Acoes</th>
            </tr>
          </thead>
          <tbody id="admin-users"></tbody>
        </table>
      </div>

      <h2>Favoritos salvos</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Usuario</th>
              <th>ObjectID</th>
              <th>Acoes</th>
            </tr>
          </thead>
          <tbody id="admin-favorites"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/admin.js"></script>
</body>

</html>
