<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Artfinder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="../assets/css/home-styles.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="stripes" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
  <nav>
    <a class="nav-logo" href="index.html">Artfinder</a>
    <ul class="links-nav" id="Links-nav"></ul>
    <button class="nav-toggle" id="navToggle" aria-label="Menu"><span></span><span></span><span></span></button>
  </nav>

  <main class="auth-page">
    <section class="auth-panel">
      <h1>Criar conta</h1>
      <form id="signup-form" class="stacked-form">
        <label>Nome
          <input name="nome" type="text" required autocomplete="name">
        </label>
        <label>E-mail
          <input name="email" type="email" required autocomplete="email">
        </label>
        <label>Usuario
          <input name="login" type="text" required autocomplete="username">
        </label>
        <label>Senha
          <input name="senha" type="password" required autocomplete="new-password">
        </label>
        <button class="btn btn-primary" type="submit">Cadastrar</button>
        <p id="auth-status" class="form-status"></p>
      </form>
      <p class="auth-link">Ja tem conta? <a href="login.html">Entrar</a></p>
    </section>
  </main>

  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>

</html>
