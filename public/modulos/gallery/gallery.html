<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria - Artfinder</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="../../assets/css/gallery-styles.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet" />
    
  <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
</head>

<body>

  <!-- Stripes -->
  <div class="stripes" aria-hidden="true">
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <!-- Nav -->
  <nav>
    <a class="nav-logo" href="../index.html">Artfinder</a>
    <ul class="links-nav" id="Links-nav">
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="#">Download</a></li>
    </ul>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Gallery Header -->
  <section class="gallery-header">
    <div class="gallery-header-content">
      <h1>Inspirações</h1>
      <p>Procure aqui oque mais interessa a você!</p>
    </div>
  </section>

  <!-- Gallery Grid -->
  <section class="gallery-section">
    <div class="gallery-container">
      <div id="gallery-grid" class="gallery-grid">
        <!-- Obras renderizadas por gallery-script.js -->
      </div>
    </div>
  </section>

  <!-- Filter Section -->
  <section class="filter-section">
    <div class="filter-container">
      <h3>Filtrar por categoria</h3>
      <div class="filter-buttons" id="filter-buttons">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <!-- Categorias renderizadas dinamicamente -->
      </div>
    </div>
  </section>

  <footer>
    &copy; 2026 <span>Artfinder</span>. Todos os direitos reservados.
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="../../assets/js/gallery-script.js"></script>
</body>

</html>
